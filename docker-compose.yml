services:
  tgfs:
    build: .
    image: gunysa1/tgfs-webdav:local
    container_name: tgfs-webdav
    restart: unless-stopped
    ports:
      - "1900:1900"
    environment:
      # config.yaml is mounted separately (keeps secrets out of the data volume)
      TGFS_CONFIG_FILE: /config/config.yaml
    volumes:
      - ./config.yaml:/config/config.yaml:ro
      # secrets: the app reads $TGFS_DATA_DIR/.env at startup (mounted read-only).
      # Source is named secrets.env (NOT .env) so Docker Compose does not auto-load
      # it for its own interpolation, which would warn on/blank any '$' in a secret.
      - ./secrets.env:/home/tgfs/.tgfs/.env:ro
      - tgfs-data:/home/tgfs/.tgfs

volumes:
  tgfs-data:
